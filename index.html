<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie – Qooqle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="logo">
                <span class="blue">Q</span><span class="red">o</span><span class="yellow">o</span><span class="blue">q</span><span class="green">l</span><span class="red">e</span>
            </h1>
            <h2>Zaloguj się</h2>
            <p>Użyj konta Qooqle</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" required>
                    <label>E-mail lub telefon</label>
                </div>
                
                <div class="footer-actions">
                    <a href="#">Nie pamiętasz adresu e-mail?</a>
                    <div class="info-text">To nie Twój komputer? Użyj trybu gościa, aby zalogować się prywatnie.</div>
                </div>

                <div class="buttons">
                    <button type="button" class="secondary">Utwórz konto</button>
                    <button type="submit" class="primary">Dalej</button>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
